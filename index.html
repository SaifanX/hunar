<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNAR | Premium Interior Architecture</title>
    <script>
      // Immediate brand-sync: Lock dark mode before paint
      document.documentElement.classList.add('dark');
      document.documentElement.style.backgroundColor = '#171512';
    </script>

    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23b18d59%22/><text y=%22.9em%22 x=%2250%%22 text-anchor=%22middle%22 font-family=%22Sora, sans-serif%22 font-weight=%22bold%22 font-size=%2265%22 fill=%22white%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">

    <style>
      /* Critical CSS for the Pre-render Shell */
      body { background-color: #171512; margin: 0; padding: 0; font-family: 'Sora', system-ui, sans-serif; }
      .pre-render-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background-color: #171512;
      }
      .shell-logo {
        width: 60px;
        height: 60px;
        border: 4px solid #B18D59;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: rotate 2s cubic-bezier(0.76, 0, 0.24, 1) infinite;
      }
      .shell-logo span { color: white; font-size: 24px; font-weight: 800; }
      .shell-text {
        margin-top: 24px;
        color: #B18D59;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        opacity: 0.5;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(180deg); } 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    </style>
</head>
<body class="font-display bg-charcoal text-white selection:bg-primary selection:text-white">
    <div id="root">
      <!-- High-Fidelity Pre-render Shell -->
      <div class="pre-render-shell" id="app-shell">
        <div class="shell-logo"><span>H</span></div>
        <div class="shell-text">Hunar Studio</div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Gracefully remove the shell after hydration
      // Using a slightly longer delay to ensure React has fully rendered the first frame
      window.addEventListener('load', () => {
        setTimeout(() => {
          const shell = document.getElementById('app-shell');
          if (shell) {
            shell.style.opacity = '0';
            shell.style.transition = 'opacity 0.8s ease-out';
            setTimeout(() => shell.remove(), 800);
          }
        }, 500);
      });
    </script>
</body>
</html>
